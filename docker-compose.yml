# Docker Compose configuration for the Blender WASM build environment.
# Usage:
#   docker-compose run blender-wasm-build bash
#   docker-compose run blender-wasm-build scripts/build-host-tools.sh

services:
  blender-wasm-build:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Blender source -- mounted read-only to prevent accidental modification
      - ./Blender Mirror:/src/blender:ro
      # Native host tools build output (Stage 1)
      - ./build-native:/src/build-native
      # WASM build output (Stage 3)
      - ./build-wasm:/src/build-wasm
      # Compilation cache for faster rebuilds
      - ./.ccache:/src/.ccache
    environment:
      EMSDK: /emsdk
      CCACHE_DIR: /src/.ccache
    command: /bin/bash
